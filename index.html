<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - TehJumbo.io</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle at top right, #f1f5f9, #f8fafc);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.05), 0 8px 10px -6px rgb(0 0 0 / 0.05);
            border-color: #10b981;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.6s ease-out forwards; }
        .toast-enter { transform: translateX(100%); opacity: 0; }
        .toast-active { transform: translateX(0); opacity: 1; transition: all 0.3s ease; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; backdrop-filter: blur(4px); overflow-y: auto;}
        .modal.active { display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="p-6 md:p-12">

    <div id="toast" class="fixed top-6 right-6 z-[100] flex items-center gap-3 px-6 py-4 bg-slate-900 text-white rounded-2xl shadow-2xl transition-all toast-enter pointer-events-none">
        <div class="bg-emerald-500 p-1.5 rounded-lg"><i data-lucide="bell" class="w-4 h-4"></i></div>
        <span id="toastMsg" class="text-sm font-bold"></span>
    </div>

    <div id="settingsModal" class="modal p-6">
        <div class="bg-white w-full max-w-lg rounded-[2.5rem] p-8 shadow-2xl animate-fade my-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-black text-slate-800">Pengaturan Toko</h2>
                <button onclick="toggleModal()" class="text-slate-400 hover:text-slate-600"><i data-lucide="x"></i></button>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">Nama Toko</label>
                    <input type="text" id="editStoreName" class="w-full mt-1 bg-slate-100 border-none rounded-xl p-4 focus:ring-2 focus:ring-emerald-500 font-bold text-slate-800">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">Alamat Toko</label>
                    <textarea id="editStoreAddr" rows="2" class="w-full mt-1 bg-slate-100 border-none rounded-xl p-4 focus:ring-2 focus:ring-emerald-500 font-medium text-slate-700"></textarea>
                </div>
                
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-widest ml-1 mb-2 block">Sosial Media</label>
                    <div id="sosmedContainer" class="space-y-3"></div>
                    <button onclick="addSosmedField()" class="w-full mt-3 border-2 border-dashed border-slate-200 py-2 rounded-xl text-slate-400 hover:text-emerald-500 hover:border-emerald-500 transition-all font-bold text-sm">
                        + Tambah Sosial Media
                    </button>
                </div>

                <button onclick="saveSettings()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-xl hover:bg-emerald-600 transition-colors mt-4">
                    Simpan Perubahan
                </button>
            </div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto space-y-12">
        <header class="flex flex-col md:flex-row justify-between items-center gap-8 animate-fade">
            <div class="text-center md:text-left flex-1 px-2">
                <div class="flex items-center justify-center md:justify-start gap-4 mb-3">
                    <h1 id="displayStoreName" class="text-4xl md:text-5xl font-black text-slate-900 italic uppercase tracking-tight">TEH JUMBO</h1>
                    <button onclick="toggleModal()" class="p-2 bg-white rounded-full shadow-sm border border-slate-100 hover:bg-slate-50 transition-all">
                        <i data-lucide="settings" class="w-5 h-5 text-slate-400"></i>
                    </button>
                </div>
                <div class="flex flex-col md:flex-row items-center justify-center md:justify-start gap-4">
                    <div class="flex items-center gap-2">
                        <div class="bg-emerald-500 w-2 h-2 rounded-full animate-pulse shrink-0"></div>
                        <p id="displayStoreAddr" class="text-slate-500 text-sm md:text-base font-medium">Jl. Pahlawan, Madiun</p>
                    </div>
                    <div id="displaySosmed" class="flex flex-wrap items-center justify-center md:justify-start gap-x-4 gap-y-2 text-slate-400"></div>
                </div>
            </div>
            
            <div class="text-center md:text-right shrink-0">
                <h3 id="liveClock" class="text-3xl font-black text-slate-800 tracking-tighter">00:00:00</h3>
                <p id="liveDate" class="text-xs font-bold text-slate-400 uppercase tracking-widest mt-1"></p>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 animate-fade">
            <a href="kasir.html" class="glass-card p-8 rounded-[2.5rem] group relative overflow-hidden cursor-pointer">
                <div class="absolute -right-4 -top-4 w-32 h-32 bg-emerald-500/5 rounded-full group-hover:scale-150 transition-all duration-700"></div>
                <div class="w-16 h-16 bg-emerald-500 text-white rounded-2xl flex items-center justify-center mb-6 shadow-lg shadow-emerald-200"><i data-lucide="monitor" class="w-8 h-8"></i></div>
                <h3 class="text-2xl font-black text-slate-800 mb-2">Terminal Kasir</h3>
                <p class="text-slate-500 text-sm font-medium">Input transaksi penjualan.</p>
            </a>

            <a href="katalog.html" class="glass-card p-8 rounded-[2.5rem] group relative overflow-hidden cursor-pointer">
                <div class="absolute -right-4 -top-4 w-32 h-32 bg-violet-500/5 rounded-full group-hover:scale-150 transition-all duration-700"></div>
                <div class="w-16 h-16 bg-violet-500 text-white rounded-2xl flex items-center justify-center mb-6 shadow-lg shadow-violet-200"><i data-lucide="book-open" class="w-8 h-8"></i></div>
                <h3 class="text-2xl font-black text-slate-800 mb-2">Katalog Menu</h3>
                <p class="text-slate-500 text-sm font-medium">Atur daftar harga dan bahan.</p>
            </a>

            <a href="stok.html" class="glass-card p-8 rounded-[2.5rem] group relative overflow-hidden cursor-pointer">
                <div class="absolute -right-4 -top-4 w-32 h-32 bg-blue-500/5 rounded-full group-hover:scale-150 transition-all duration-700"></div>
                <div class="w-16 h-16 bg-blue-500 text-white rounded-2xl flex items-center justify-center mb-6 shadow-lg shadow-blue-200"><i data-lucide="package" class="w-8 h-8"></i></div>
                <h3 class="text-2xl font-black text-slate-800 mb-2">Manajemen Stok</h3>
                <p class="text-slate-500 text-sm font-medium">Kelola bahan baku & real-time.</p>
            </a>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const CONFIG_KEY = 'tehJumboConfig';

        window.onload = () => {
            updateDashboard();
            setInterval(updateTime, 1000);
            updateTime();
        };

        function updateDashboard() {
            const config = JSON.parse(localStorage.getItem(CONFIG_KEY) || '{}');
            
            document.getElementById('displayStoreName').innerText = config.name || "TEH JUMBO";
            document.getElementById('displayStoreAddr').innerText = config.addr || "Jl. Pahlawan, Madiun";
            
            const sosmed = config.sosmed || [];
            const displaySosmed = document.getElementById('displaySosmed');
            displaySosmed.innerHTML = sosmed.map(s => {
                const platformName = s.icon === 'globe' ? 'Website' : s.icon.charAt(0).toUpperCase() + s.icon.slice(1);
                return `
                    <div class="text-xs font-bold text-slate-400">
                        ${platformName}: <span class="text-slate-600">${s.handle}</span>
                    </div>
                `;
            }).join('');
        }

        function toggleModal() {
            const modal = document.getElementById('settingsModal');
            if (!modal.classList.contains('active')) {
                const config = JSON.parse(localStorage.getItem(CONFIG_KEY) || '{}');
                document.getElementById('editStoreName').value = config.name || "";
                document.getElementById('editStoreAddr').value = config.addr || "";
                
                const savedSosmed = config.sosmed || [];
                const container = document.getElementById('sosmedContainer');
                container.innerHTML = '';
                savedSosmed.forEach(item => addSosmedField(item.icon, item.handle));
            }
            modal.classList.toggle('active');
        }

        function addSosmedField(platform = 'instagram', handle = '') {
            const container = document.getElementById('sosmedContainer');
            const div = document.createElement('div');
            div.className = 'flex gap-2 items-center';
            div.innerHTML = `
                <select class="bg-slate-100 p-3 rounded-xl text-sm font-bold border-none">
                    <option value="instagram" ${platform === 'instagram' ? 'selected' : ''}>Instagram</option>
                    <option value="facebook" ${platform === 'facebook' ? 'selected' : ''}>Facebook</option>
                    <option value="twitter" ${platform === 'twitter' ? 'selected' : ''}>Twitter</option>
                    <option value="tiktok" ${platform === 'tiktok' ? 'selected' : ''}>TikTok</option>
                    <option value="globe" ${platform === 'globe' ? 'selected' : ''}>Website</option>
                </select>
                <input type="text" placeholder="@username" value="${handle}" class="flex-1 bg-slate-100 p-3 rounded-xl font-medium text-slate-700">
                <button onclick="this.parentElement.remove()" class="text-red-400 hover:text-red-600 p-2"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
            `;
            container.appendChild(div);
            lucide.createIcons();
        }

        function saveSettings() {
            const name = document.getElementById('editStoreName').value;
            const addr = document.getElementById('editStoreAddr').value;
            const sosmedRows = document.querySelectorAll('#sosmedContainer > div');
            const sosmedData = Array.from(sosmedRows).map(row => ({
                icon: row.querySelector('select').value,
                handle: row.querySelector('input').value
            }));

            // Save to one key
            localStorage.setItem(CONFIG_KEY, JSON.stringify({ name, addr, sosmed: sosmedData }));

            updateDashboard();
            toggleModal();
            notify("Data Toko Tersimpan!");
        }

        function updateTime() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('liveClock').innerText = now.toLocaleTimeString('id-ID');
            document.getElementById('liveDate').innerText = now.toLocaleDateString('id-ID', options);
        }

        function notify(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            toast.classList.add('toast-active');
            toast.classList.remove('toast-enter');
            setTimeout(() => {
                toast.classList.remove('toast-active');
                toast.classList.add('toast-enter');
            }, 3000);
        }
    </script>
</body>
</html>
