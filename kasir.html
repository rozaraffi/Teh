<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TehJumbo.io - Kasir Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .custom-date::-webkit-calendar-picker-indicator {
            background: transparent; bottom: 0; color: transparent; cursor: pointer;
            height: auto; left: 0; position: absolute; right: 0; top: 0; width: auto;
        }
        @keyframes scaleUp { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .animate-modal { animation: scaleUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        @media print {
            body * { visibility: hidden; }
            #receiptPrint, #receiptPrint * { visibility: visible; }
            #receiptPrint { position: absolute; left: 0; top: 0; width: 58mm; display: block !important; }
            @page { size: 58mm auto; margin: 0; }
        }
    </style>
</head>
<body>

    <div id="confirmModal" class="fixed inset-0 z-[200] flex items-center justify-center hidden bg-slate-900/60 backdrop-blur-sm p-4">
        <div class="bg-white rounded-[2.5rem] p-8 max-w-sm w-full shadow-2xl text-center animate-modal">
            <div class="w-16 h-16 bg-amber-100 text-amber-600 rounded-full flex items-center justify-center mx-auto mb-4">
                <i data-lucide="alert-triangle" class="w-10 h-10"></i>
            </div>
            <h3 id="confirmTitle" class="text-xl font-black text-slate-900 mb-1">Konfirmasi</h3>
            <p id="confirmDesc" class="text-slate-500 text-sm font-medium mb-6">Apakah Anda yakin ingin melanjutkan?</p>
            <div class="flex gap-3">
                <button onclick="closeConfirmModal()" class="flex-1 py-3.5 bg-slate-100 text-slate-600 font-bold rounded-2xl hover:bg-slate-200 transition-all">Batal</button>
                <button onclick="executeAction()" class="flex-1 py-3.5 bg-emerald-600 text-white font-bold rounded-2xl hover:bg-emerald-700 transition-all">Lanjut</button>
            </div>
        </div>
    </div>

    <div id="successModal" class="fixed inset-0 z-[200] flex items-center justify-center hidden bg-slate-900/60 backdrop-blur-sm p-4">
        <div class="bg-white rounded-[2.5rem] p-8 max-w-sm w-full shadow-2xl text-center animate-modal">
            <div class="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-4">
                <i data-lucide="check-circle" class="w-10 h-10"></i>
            </div>
            <h3 id="modalTitle" class="text-xl font-black text-slate-900 mb-1">Berhasil!</h3>
            <p id="modalDesc" class="text-slate-500 text-sm font-medium mb-6">Aksi berhasil dilakukan.</p>
            <button onclick="closeSuccessModal()" class="w-full py-3.5 bg-slate-900 text-white font-bold rounded-2xl hover:bg-slate-800 transition-all">OK</button>
        </div>
    </div>

    <div class="min-h-screen flex">
        <aside class="w-64 bg-slate-900 text-slate-300 hidden md:block border-r border-slate-800">
            <div class="p-6 text-white flex items-center gap-3">
                <div class="bg-emerald-500 p-2 rounded-lg text-white"><i data-lucide="shopping-cart"></i></div>
                <span class="text-xl font-bold text-emerald-500 tracking-tight">TehJumbo.io</span>
            </div>
            <nav class="mt-4 px-4 space-y-1">
                <a href="katalog.html" class="flex items-center gap-3 px-4 py-3 hover:bg-slate-800 rounded-xl font-semibold"><i data-lucide="book-open"></i> Katalog</a>
                <a href="#" class="flex items-center gap-3 px-4 py-3 bg-emerald-500/10 text-emerald-400 rounded-xl font-semibold border-l-4 border-emerald-500"><i data-lucide="monitor"></i> Kasir</a>
                <a href="stok.html" class="flex items-center gap-3 px-4 py-3 hover:bg-slate-800 rounded-xl font-semibold"><i data-lucide="package"></i> Stok</a>
            </nav>
        </aside>

        <main class="flex-1 p-6 md:p-10 space-y-8 overflow-y-auto">
            <header class="flex justify-between items-center">
                <div>
                    <h2 class="text-3xl font-black text-slate-900 italic uppercase">TERMINAL <span class="text-emerald-600">KASIR</span></h2>
                    <p class="text-slate-500 text-sm font-medium">Input pesanan & kelola riwayat transaksi.</p>
                </div>
                <div id="clock" class="text-right font-black text-slate-400 bg-white px-4 py-2 rounded-xl shadow-sm border border-slate-100"></div>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <div class="lg:col-span-5 space-y-6">
                    <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-200 space-y-5">
                        <div class="space-y-4">
                            <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1">Tanggal Transaksi</label>
                                <input type="date" id="inputTanggal" readonly class="w-full bg-transparent font-bold text-slate-700 outline-none cursor-default">
                            </div>
                            <select id="selectProduk" onchange="updateHargaInfo()" class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl font-bold text-slate-700 focus:ring-2 focus:ring-emerald-500 outline-none"></select>
                            <div class="grid grid-cols-2 gap-4">
                                <div class="relative">
                                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-[10px] font-bold text-slate-400 uppercase">Rp</span>
                                    <input type="text" id="hargaDisplay" readonly class="w-full pl-10 pr-4 py-4 bg-slate-100 rounded-2xl font-black text-slate-500 cursor-not-allowed">
                                </div>
                                <div class="relative">
                                    <input type="number" id="inputQty" min="1" value="1" class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl font-black text-slate-700">
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <button onclick="setMetode('TUNAI')" id="btnTunai" class="metode-btn py-3.5 rounded-2xl border-2 font-black text-xs transition-all tracking-widest">TUNAI</button>
                                <button onclick="setMetode('QRIS')" id="btnQRIS" class="metode-btn py-3.5 rounded-2xl border-2 font-black text-xs transition-all tracking-widest">QRIS</button>
                            </div>
                        </div>
                        <button onclick="addToCart()" class="w-full py-4 bg-slate-900 text-white font-black rounded-2xl hover:bg-slate-800 transition-all flex items-center justify-center gap-3 shadow-lg active:scale-[0.98]">
                            <i data-lucide="plus-circle" class="w-5 h-5"></i> TAMBAH PESANAN
                        </button>
                    </div>
                </div>

                <div class="lg:col-span-7 space-y-6">
                    <div id="cartSection" class="hidden bg-emerald-600 p-8 rounded-[2.5rem] shadow-xl text-white space-y-6">
                        <div id="cartItems" class="space-y-3 max-h-48 overflow-y-auto pr-2"></div>
                        <div class="pt-6 border-t border-white/20 flex justify-between items-end">
                            <div>
                                <p class="text-emerald-200 text-[10px] font-bold uppercase tracking-widest">Total Bayar</p>
                                <h3 id="cartTotal" class="text-4xl font-black">Rp 0</h3>
                            </div>
                            <button onclick="submitTransaksi()" class="px-10 py-4 bg-white text-emerald-600 font-black rounded-2xl hover:bg-emerald-50 transition-all active:scale-95">BAYAR</button>
                        </div>
                    </div>

                    <div class="bg-white p-6 rounded-[2.5rem] border border-slate-200 shadow-sm space-y-4">
                        <div class="flex items-center justify-between">
                            <h4 class="font-black text-slate-900 text-xs tracking-widest uppercase flex items-center gap-2">
                                <i data-lucide="search" class="w-4 h-4 text-emerald-500"></i> Riwayat Transaksi
                            </h4>
                            <div class="flex gap-2">
                                <button onclick="exportData()" class="px-3 py-2 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-xl font-black text-[9px] uppercase transition-all">Export</button>
                                <button onclick="document.getElementById('importFile').click()" class="px-3 py-2 bg-emerald-100 hover:bg-emerald-200 text-emerald-700 rounded-xl font-black text-[9px] uppercase transition-all">Import</button>
                                <input type="file" id="importFile" accept=".json" class="hidden" onchange="importData(event)">
                            </div>
                        </div>
                        <div class="relative">
                            <input type="date" id="filterTanggal" onchange="renderTransactions()" class="custom-date w-full px-5 py-3.5 bg-slate-50 border border-emerald-100 rounded-2xl font-black text-slate-700 focus:ring-2 focus:ring-emerald-500 outline-none">
                            <i data-lucide="calendar" class="absolute right-5 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 pointer-events-none"></i>
                        </div>
                    </div>

                    <div class="bg-white rounded-[2.5rem] border border-slate-200 overflow-hidden shadow-sm">
                        <div class="overflow-x-auto max-h-[300px]">
                            <table class="w-full text-left">
                                <thead class="bg-slate-50/50 sticky top-0 z-10">
                                    <tr>
                                        <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase">Jam</th>
                                        <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase">Nominal</th>
                                        <th class="px-6 py-4 text-right"></th>
                                    </tr>
                                </thead>
                                <tbody id="transTableBody" class="divide-y divide-slate-50"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="receiptPrint" class="hidden bg-white text-black p-4" style="font-family: 'Courier New', monospace;">
        <div style="text-align:center; border-bottom:1px dashed #000; padding-bottom:10px; margin-bottom:10px;">
            <p style="font-size:18px; font-weight:bold; margin:0;" id="printNamaToko">TEH JUMBO</p>
            <p style="font-size:10px; margin:2px 0;" id="printAlamatToko">Madiun</p>
            <p style="font-size:9px;" id="receiptFullTime"></p>
        </div>
        <div id="receiptItems" style="font-size:10px; margin-bottom:8px;"></div>
        <div style="border-top:1px dashed #000; padding-top:5px; font-size:10px;">
            <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:13px; margin-top:5px;">
                <span>TOTAL:</span><span id="receiptTotal"></span>
            </div>
        </div>
        <div style="text-align:center; margin-top:15px; font-size:9px; border-top:1px dashed #000; padding-top:5px;">
            <p>Terima Kasih</p>
            <p id="printIG">@tehjumbo.madiun</p>
        </div>
    </div>

    <script>
        let catalogData = JSON.parse(localStorage.getItem('KatalogEs')) || [];
        let stockData = JSON.parse(localStorage.getItem('StokEs')) || [];
        let transaksiHistory = JSON.parse(localStorage.getItem('TransaksiTeh')) || [];
        
        let cart = [];
        let selectedMetode = 'TUNAI';
        
        // State untuk modal konfirmasi
        let pendingAction = { type: null, id: null };

        window.onload = () => {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('inputTanggal').value = today;
            document.getElementById('filterTanggal').value = today;
            updateClock(); 
            setInterval(updateClock, 1000);
            populateMenuFromCatalog();
            renderTransactions();
            setMetode('TUNAI');
            lucide.createIcons();
        };

        // --- Logika Modal Kustom ---
        function showConfirmModal(title, desc, type, id) {
            document.getElementById('confirmTitle').innerText = title;
            document.getElementById('confirmDesc').innerText = desc;
            pendingAction = { type, id };
            document.getElementById('confirmModal').classList.remove('hidden');
        }

        function closeConfirmModal() { document.getElementById('confirmModal').classList.add('hidden'); }
        
        function executeAction() {
            if (pendingAction.type === 'delete') performDelete(pendingAction.id);
            if (pendingAction.type === 'edit') performEdit(pendingAction.id);
            closeConfirmModal();
        }

        // --- Logika Transaksi ---
        function returnStock(items) {
            items.forEach(c => {
                c.resep.forEach(r => {
                    const bahan = stockData.find(s => s.nama === r.nama);
                    if(bahan) bahan.stok += (r.qty * c.qty);
                });
            });
            localStorage.setItem('StokEs', JSON.stringify(stockData));
        }

        function performDelete(id) {
            const index = transaksiHistory.findIndex(t => t.id === id);
            if(index !== -1) {
                returnStock(transaksiHistory[index].items);
                transaksiHistory.splice(index, 1);
                saveAndRefresh();
            }
        }

        function performEdit(id) {
            const index = transaksiHistory.findIndex(t => t.id === id);
            if(index !== -1) {
                const t = transaksiHistory[index];
                returnStock(t.items);
                cart = [...t.items];
                transaksiHistory.splice(index, 1);
                saveAndRefresh();
                renderCart();
            }
        }

        // --- Helper ---
        function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID'); }

        function setMetode(m) {
            selectedMetode = m;
            document.querySelectorAll('.metode-btn').forEach(b => b.className = 'metode-btn py-3.5 rounded-2xl border-2 font-black text-xs border-slate-100 text-slate-400');
            const active = m === 'TUNAI' ? 'btnTunai' : 'btnQRIS';
            const color = m === 'TUNAI' ? 'border-emerald-500 text-emerald-600 bg-emerald-50' : 'border-blue-500 text-blue-600 bg-blue-50';
            document.getElementById(active).className = `metode-btn py-3.5 rounded-2xl border-2 font-black text-xs ${color}`;
        }

        function populateMenuFromCatalog() {
            const select = document.getElementById('selectProduk');
            select.innerHTML = '<option value="">Pilih Menu...</option>';
            catalogData.forEach(item => {
                const sisa = getSisaPorsi(item.resep);
                select.innerHTML += `<option value="${item.id}" ${sisa <= 0 ? 'disabled' : ''}>${item.nama} (${sisa} Cup)</option>`;
            });
        }

        function getSisaPorsi(resep) {
            let sisa = Infinity;
            resep.forEach(r => {
                const bahan = stockData.find(s => s.nama === r.nama);
                sisa = Math.min(sisa, bahan ? Math.floor(bahan.stok / r.qty) : 0);
            });
            return sisa === Infinity ? 0 : sisa;
        }

        function updateHargaInfo() {
            const id = document.getElementById('selectProduk').value;
            const item = catalogData.find(m => String(m.id) === id);
            document.getElementById('hargaDisplay').value = item ? item.hargaJual.toLocaleString() : '';
        }

        function addToCart() {
            const id = document.getElementById('selectProduk').value;
            const qty = parseInt(document.getElementById('inputQty').value);
            if(!id) return;
            const item = catalogData.find(m => String(m.id) === id);
            cart.push({ ...item, qty, cartId: Date.now() });
            renderCart();
        }

        function renderCart() {
            const cont = document.getElementById('cartItems');
            document.getElementById('cartSection').classList.toggle('hidden', cart.length === 0);
            cont.innerHTML = cart.map(item => `
                <div class="flex justify-between items-center bg-white/10 p-4 rounded-2xl border border-white/5">
                    <div class="flex flex-col">
                        <span class="text-sm font-black">${item.nama}</span>
                        <span class="text-[10px] text-emerald-100">${item.qty} x Rp ${item.hargaJual.toLocaleString()}</span>
                    </div>
                    <button onclick="removeFromCart(${item.cartId})" class="p-2 hover:bg-rose-500 rounded-xl transition-all"><i data-lucide="trash-2" class="w-4 h-4 text-white"></i></button>
                </div>
            `).join('');
            document.getElementById('cartTotal').innerText = `Rp ${cart.reduce((a,b) => a+(b.hargaJual*b.qty),0).toLocaleString()}`;
            lucide.createIcons();
        }

        function removeFromCart(id) { cart = cart.filter(c => c.cartId !== id); renderCart(); }

        function submitTransaksi() {
            if(cart.length === 0) return;
            const now = new Date();
            const dateKey = now.toISOString().split('T')[0];
            cart.forEach(c => c.resep.forEach(r => {
                const bahan = stockData.find(s => s.nama === r.nama);
                if(bahan) bahan.stok -= (r.qty * c.qty);
            }));
            transaksiHistory.unshift({
                id: Date.now(),
                tanggal: dateKey,
                waktuFull: new Intl.DateTimeFormat('id-ID', { dateStyle: 'medium', timeStyle: 'short' }).format(now),
                items: cart, 
                total: cart.reduce((a,b) => a+(b.hargaJual*b.qty),0), 
                metode: selectedMetode
            });
            saveAndRefresh(); cart = []; renderCart();
            showSuccessModal("Berhasil!", "Transaksi tersimpan.");
        }

        function saveAndRefresh() {
            localStorage.setItem('StokEs', JSON.stringify(stockData));
            localStorage.setItem('TransaksiTeh', JSON.stringify(transaksiHistory));
            renderTransactions(); 
            populateMenuFromCatalog();
        }

        function renderTransactions() {
            const filterDate = document.getElementById('filterTanggal').value;
            const body = document.getElementById('transTableBody');
            body.innerHTML = '';
            const filteredData = transaksiHistory.filter(t => t.tanggal === filterDate);
            filteredData.forEach((t) => {
                body.innerHTML += `<tr class="hover:bg-slate-50 transition-all border-b border-slate-50">
                    <td class="px-6 py-4 font-bold text-slate-700 text-[11px]">${t.waktuFull.split(' ')[2]} ${t.waktuFull.split(' ')[3]}</td>
                    <td class="px-6 py-4">
                        <span class="font-black text-slate-900 text-xs">Rp ${t.total.toLocaleString()}</span> 
                        <span class="text-[8px] ${t.metode === 'TUNAI' ? 'bg-emerald-100 text-emerald-700' : 'bg-blue-100 text-blue-700'} px-2 py-0.5 rounded-md ml-1 font-black uppercase">${t.metode}</span>
                    </td>
                    <td class="px-6 py-4 text-right flex gap-1 justify-end">
                        <button onclick="showConfirmModal('Edit Transaksi', 'Edit transaksi ini? Stok akan dikembalikan.', 'edit', ${t.id})" class="p-2 hover:bg-blue-50 rounded-lg text-blue-500"><i data-lucide="edit" class="w-4 h-4"></i></button>
                        <button onclick="showConfirmModal('Hapus Transaksi', 'Yakin ingin menghapus? Stok akan dikembalikan.', 'delete', ${t.id})" class="p-2 hover:bg-rose-50 rounded-lg text-rose-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        <button onclick="printTrans(${t.id})" class="p-2 hover:bg-emerald-50 rounded-lg text-emerald-500"><i data-lucide="printer" class="w-4 h-4"></i></button>
                    </td>
                </tr>`;
            });
            if(filteredData.length === 0) body.innerHTML = `<tr><td colspan="3" class="px-6 py-10 text-center text-slate-400 text-xs italic">Tidak ada data.</td></tr>`;
            lucide.createIcons();
        }

        // --- Cetak dengan data Realtime ---
        function printTrans(id) {
            const t = transaksiHistory.find(x => x.id === id);
            if(!t) return;
            // AMBIL DATA TERBARU DARI LOCALSTORAGE
            const info = JSON.parse(localStorage.getItem('InformasiToko')) || { nama: "TEH JUMBO", alamat: "Madiun", ig: "@tehjumbo.madiun" };
            
            document.getElementById('printNamaToko').innerText = info.nama.toUpperCase();
            document.getElementById('printAlamatToko').innerText = info.alamat;
            document.getElementById('printIG').innerText = info.ig || "";
            document.getElementById('receiptFullTime').innerText = t.waktuFull;
            document.getElementById('receiptTotal').innerText = `Rp ${t.total.toLocaleString()}`;
            document.getElementById('receiptItems').innerHTML = t.items.map(i => `<div style="display:flex; justify-content:space-between; margin-bottom:2px;"><span>${i.qty}x ${i.nama}</span><span>${(i.qty*i.hargaJual).toLocaleString()}</span></div>`).join('');
            window.print();
        }

        // --- Modals Sukses ---
        function showSuccessModal(title, desc) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalDesc').innerText = desc;
            document.getElementById('successModal').classList.remove('hidden');
        }
        function closeSuccessModal() { document.getElementById('successModal').classList.add('hidden'); }

        // --- Export/Import ---
        function exportData() {
            const dataStr = localStorage.getItem('TransaksiTeh');
            if (!dataStr) return alert("Tidak ada data transaksi!");
            const blob = new Blob([dataStr], {type: "application/json"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Backup_Transaksi_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    transaksiHistory = importedData;
                    saveAndRefresh();
                    showSuccessModal("Berhasil!", "Data telah diimport.");
                } catch (err) { alert("Gagal mengimpor file."); }
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
